<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Creative Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#020617;
color:#fff;
line-height:1.6;
}

a{text-decoration:none;color:#38bdf8;}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{font-size:48px;}
header p{color:#94a3b8;margin-top:5px;}

.btn{
margin-top:15px;
padding:12px 25px;
background:#38bdf8;
border:none;
border-radius:6px;
color:white;
display:inline-block;
cursor:pointer;
transition:.3s;
}
.btn:hover{background:#0ea5e9;}

nav{
background:#020617;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #1e293b;
}
nav ul{display:flex;justify-content:center;list-style:none;}
nav li{margin:0 20px;}
nav a{color:white;padding:15px;display:block;}

section{max-width:1100px;margin:auto;padding:80px 20px;}
h2{text-align:center;margin-bottom:40px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
text-align:center;
transition:.3s;
cursor:pointer;
border:1px solid #1e293b;
}
.card:hover{
transform:translateY(-6px);
border-color:#38bdf8;
}

/* Tabs */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Popup */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.popup-box{
background:#0f172a;
padding:25px;
border-radius:12px;
width:90%;
max-width:500px;
text-align:center;
border:1px solid #1e293b;
}

/* WhatsApp Button */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
cursor:pointer;
z-index:4000;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* WhatsApp Popup */
#whatsappPopup{
position:fixed;
bottom:90px;
right:20px;
background:#0f172a;
padding:20px;
border-radius:12px;
display:none;
z-index:4000;
border:1px solid #1e293b;
}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Creative Content Creator</p>
<a class="btn" href="#projects">View Work</a>
</header>

<nav>
<ul>
<li><a href="#projects">Works</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- Creative Works -->
<section id="projects">
<h2>Creative Works</h2>

<div style="text-align:center;margin-bottom:30px;">
<button class="btn" onclick="openTab('rest')">Restaurants</button>
<button class="btn" onclick="openTab('cosmetics')">Cosmetics</button>
<button class="btn" onclick="openTab('design')">Design</button>
<button class="btn" onclick="openTab('shoes')">Shoes</button>
<button class="btn" onclick="openTab('medical')">Medical</button>
<button class="btn" onclick="openTab('barber')">Barber</button>
<button class="btn" onclick="openTab('ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel</div>
</div>
</div>

<div id="shoes" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('calzolaio')">Calzolaio</div>
</div>
</div>

<div id="medical" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('almoudawah')">Almoudawah</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Advertisements</div>
</div>
</div>

</section>

<!-- Popup -->
<div id="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<!-- WhatsApp Button -->
<div class="whatsapp" onclick="toggleWhatsApp()">💬</div>

<div id="whatsappPopup">
<p>Contact me on WhatsApp</p>
<a class="btn" href="https://wa.me/201115002997" target="_blank">Chat Now</a>
</div>

<script>

function openTab(id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openBrand(b){

const data={

hirisk:{
title:"Hi Risk",
desc:"Restaurant & cafe content.",
links:[
["Instagram","https://www.instagram.com/hiriskcafe"],
["TikTok","https://www.tiktok.com/@hi_risk1"]
]
},

ceramed:{
title:"Ceramed",
desc:"Cosmetics brand content.",
links:[
["Instagram","https://www.instagram.com/ceramed.pharma"]
]
},

hameed:{
title:"Hameed",
desc:"Food content creation.",
links:[
["Instagram","https://www.instagram.com/hameedegypt"]
]
},

mokbel:{
title:"Mokbel",
desc:"Architecture content.",
links:[
["Instagram","https://www.instagram.com/mokbeldesignco"]
]
},

calzolaio:{
title:"Calzolaio",
desc:"Italian branding storytelling.",
links:[
["Instagram","https://www.instagram.com/calzolaioegypt"]
]
},

almoudawah:{
title:"Almoudawah",
desc:"Medical content.",
links:[
["Instagram","https://www.instagram.com/almoudawah"]
]
},

flebiny:{
title:"Flebiny Salon",
desc:"Premium barber content.",
links:[
["Work","https://drive.google.com/drive/folders/1cU50kiA03-uOSvTkqK-fW02kgTCDMX7G"],
["Instagram","https://www.instagram.com/flebiny_salon"]
]
},

ads:{
title:"Advertisements",
desc:"Creative campaigns.",
links:[
["Christmas","https://vt.tiktok.com/ZSHY1pSfk/"]
]
}

};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank" class="btn">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* WhatsApp */
function toggleWhatsApp(){
let box=document.getElementById("whatsappPopup");
box.style.display = box.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
