<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Creative Portfolio</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#0f172a; color:white; }
a { text-decoration:none; color:#38bdf8; }

header { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; }
.btn { margin:10px; padding:10px 20px; background:#38bdf8; border-radius:6px; color:white; cursor:pointer; }

nav { background:#020617; position:sticky; top:0; }
nav ul { display:flex; justify-content:center; list-style:none; }
nav li { margin:0 15px; }
nav a { color:white; padding:15px; display:block; }

section { max-width:1100px; margin:auto; padding:60px 20px; }

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
.card { background:#1e293b; padding:20px; border-radius:10px; text-align:center; cursor:pointer; }

.tab-content{display:none;}
.tab-content.active{display:block;}

#popup{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}
.popup-box{
background:#1e293b;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Creative Content Creator</p>
</header>

<section id="projects">
<h2 style="text-align:center;">Creative Works</h2>

<div style="text-align:center;">
<button class="btn" onclick="openTab('rest')">Restaurants</button>
<button class="btn" onclick="openTab('cosmetics')">Cosmetics</button>
<button class="btn" onclick="openTab('design')">Design</button>
<button class="btn" onclick="openTab('shoes')">Shoes</button>
<button class="btn" onclick="openTab('medical')">Medical</button>
<button class="btn" onclick="openTab('barber')">Barber</button>
<button class="btn" onclick="openTab('ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel</div>
</div>
</div>

<div id="shoes" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('calzolaio')">Calzolaio</div>
</div>
</div>

<div id="medical" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('almoudawah')">Almoudawah</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Advertisements</div>
</div>
</div>

</section>

<!-- Popup -->
<div id="popup" onclick="this.style.display='none'">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<script>
function openTab(id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openBrand(b){

const data={

hirisk:{
title:"Hi Risk",
desc:"Restaurant & cafe",
links:[
["Instagram","https://www.instagram.com/hiriskcafe?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="],
["TikTok","https://www.tiktok.com/@hi_risk1?is_from_webapp=1"],
["Facebook","https://www.facebook.com"]
]
},

ceramed:{
title:"Ceramed",
desc:"Cosmetics shop",
links:[
["Instagram","https://www.instagram.com/ceramed.pharma"],
["TikTok","https://www.tiktok.com/@ceramed.pharma"],
["Facebook","https://www.facebook.com"]
]
},

hameed:{
title:"Hameed",
links:[
["Instagram","https://www.instagram.com/hameedegypt"],
["TikTok","https://www.tiktok.com/@hameedeg"],
["Facebook","https://www.facebook.com"]
]
},

mokbel:{
title:"Mokbel Design",
links:[
["Instagram","https://www.instagram.com/mokbeldesignco"],
["TikTok","https://www.tiktok.com/@mokbel.designco"],
["Facebook","https://www.facebook.com"]
]
},

calzolaio:{
title:"Calzolaio",
links:[
["Instagram","https://www.instagram.com/calzolaioegypt"],
["TikTok","https://www.tiktok.com/@calzolaioegypt"],
["Facebook","https://www.facebook.com"]
]
},

almoudawah:{
title:"Almoudawah",
links:[
["Instagram","https://www.instagram.com/almoudawah"],
["TikTok","https://www.tiktok.com/@almoudawah11"],
["Facebook","https://www.facebook.com"]
]
},

flebiny:{
title:"Flebiny Salon",
links:[
["Work","https://drive.google.com/drive/folders/1cU50kiA03-uOSvTkqK-fW02kgTCDMX7G"],
["Facebook","https://www.facebook.com/share/1EzSyaTWBh/"],
["Instagram","https://www.instagram.com/flebiny_salon"],
["TikTok","https://www.tiktok.com/@flebinysalon"]
]
},

ads:{
title:"Advertisements",
links:[
["Christmas","https://vt.tiktok.com/ZSHY1pSfk/"],
["Novels","https://drive.google.com/file/d/1X-ASf6_zbiyZjJ6jNUF1tGXlCmvJr87l/view"],
["Halan","https://drive.google.com/file/d/16WOXSdBURBaNYtBwVX0eapmpQwrLS7IQ/view"],
["Vlog","https://drive.google.com/file/d/1aeLtUCkgWUGnuYmayYFvfFtHO6Fvd8n-/view"]
]
}

};

let item=data[b];
document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc || "";

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank" class="btn">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}
</script>

</body>
</html>
