<!-- Popup -->
<div id="brandPopup" class="popup" onclick="closePopup()">
<div class="popup-content" onclick="event.stopPropagation()">

<h2 id="brandTitle"></h2>

<p id="brandDesc" style="margin:10px 0;color:#cbd5f5;"></p>

<div id="brandLinks" style="margin-top:15px;"></div>

</div>
</div>

<script>
function openBrand(brand){

const data={

hirisk:{
title:"Hi Risk",
desc:"Restaurant and cafe in Tanta, Gharbia Governorate",
links:[
{title:"Facebook",url:"#"}
]
},

ceramed:{
title:"Ceramed",
desc:"Cosmetics shop",
links:[
{title:"Facebook",url:"#"},
{title:"Instagram",url:"#"},
{title:"TikTok",url:"#"}
]
},

hameed:{
title:"Hameed",
desc:"مطعم بالقاهرة",
links:[
{title:"Facebook",url:"#"}
]
},

mokbel:{
title:"Mokbel Design & Architecture",
desc:"تشطيبات عربي / English finishing & design",
links:[
{title:"Facebook",url:"#"}
]
},

calzolaio:{
title:"Calzolaio",
desc:"Content creator for products with Italian branding identity",
links:[
{title:"Facebook",url:"#"}
]
},

almoudawah:{
title:"Almoudawah Center",
desc:"Specialists in cupping therapy, physiotherapy, and rehabilitation services (Saudi Arabia)",
links:[
{title:"Instagram",url:"#"}
]
},

flebiny:{
title:"Flebiny Salon",
desc:"Professional barbershop for artists and celebrities",
links:[
{title:"Works",url:"https://drive.google.com/drive/folders/1cU50kiA03-uOSvTkqK-fW02kgTCDMX7G"}
]
}

};

let item=data[brand];

document.getElementById("brandTitle").innerText=item.title;
document.getElementById("brandDesc").innerText=item.desc;

let linksHTML="";
item.links.forEach(link=>{
linksHTML+=`<a href="${link.url}" target="_blank" class="btn" style="display:block;margin:5px 0;">${link.title}</a>`;
});

document.getElementById("brandLinks").innerHTML=linksHTML;

document.getElementById("brandPopup").style.display="flex";
}

function closePopup(){
document.getElementById("brandPopup").style.display="none";
}
</script>
