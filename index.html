<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Elite Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,Arial;}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* ===== LOADING ===== */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:24px;
letter-spacing:3px;
animation:fadeOut 1s ease 2s forwards;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* ===== CURSOR ===== */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:#38bdf8;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
box-shadow:0 0 20px #38bdf8;
}

/* HEADER */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:52px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

.btn{
padding:12px 25px;
border-radius:30px;
background:#38bdf8;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

section{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:15px;
transition:.4s;
opacity:0;
transform:translateY(50px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 20px #38bdf8;
}

/* TABS */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* POPUP */
#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#0f172a;
padding:25px;
border-radius:10px;
width:90%;
max-width:500px;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<div id="loader">KHALIL AYMAN</div>
<div class="cursor" id="cursor"></div>

<header>
<h1>Khalil Ayman</h1>
<p>Elite Creative Creator</p>
<a class="btn" href="#projects">Explore</a>
</header>

<section id="projects">
<h2>Creative Works</h2>

<div>
<button class="btn" onclick="openTab('rest')">Restaurants</button>
<button class="btn" onclick="openTab('barber')">Barber</button>
<button class="btn" onclick="openTab('ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Ads</div>
</div>
</div>

</section>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<div class="whatsapp" onclick="window.open('https://wa.me/201115002997')">💬</div>

<script>

/* Cursor */
document.addEventListener("mousemove",e=>{
document.getElementById("cursor").style.left=e.clientX+"px";
document.getElementById("cursor").style.top=e.clientY+"px";
});

/* Scroll animation */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

document.querySelectorAll(".card").forEach(el=>observer.observe(el));

/* Tabs */
function openTab(id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Brands */
function openBrand(b){

const data={
hirisk:{title:"Hi Risk",desc:"Restaurant",links:[["IG","https://instagram.com"]]},
hameed:{title:"Hameed",desc:"Food",links:[["IG","https://instagram.com"]]},
flebiny:{title:"Flebiny",desc:"Barber",links:[["Work","https://drive.google.com"]]},
ads:{title:"Ads",desc:"Campaigns",links:[["Christmas","https://tiktok.com"]]}
};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a class="btn" href="${l[1]}" target="_blank">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
