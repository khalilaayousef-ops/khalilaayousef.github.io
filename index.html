<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#050505;
color:#fff;
}

/* Glow */
.glow{
box-shadow:0 0 20px rgba(255,255,255,0.05);
}

/* Header */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(180deg,#050505,#0a0a0a);
}

header h1{
font-size:50px;
letter-spacing:1px;
}

header p{
color:#aaa;
margin-top:10px;
}

.btn{
margin-top:20px;
padding:12px 25px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:#fff;
color:#000;
}

/* Sections */
section{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

h2{
text-align:center;
margin-bottom:40px;
font-size:30px;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* Cards */
.card{
background:#0a0a0a;
padding:25px;
border-radius:12px;
border:1px solid #111;
transition:.4s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(255,255,255,0.08);
}

/* Tabs */
.tabs{
text-align:center;
margin-bottom:30px;
}

.tab-btn{
margin:5px;
padding:10px 15px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:6px;
cursor:pointer;
}

.tab-btn.active{
background:#fff;
color:#000;
}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* Popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.popup-box{
background:#0a0a0a;
padding:30px;
border-radius:12px;
width:90%;
max-width:500px;
text-align:center;
border:1px solid #222;
}

/* WhatsApp */
#whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#fff;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,0.4);
transition:.3s;
}

#whatsapp:hover{
transform:scale(1.1);
}

/* Footer */
footer{
text-align:center;
padding:20px;
color:#777;
}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Creative Content Creator</p>
<a href="#projects" class="btn">Explore My Work</a>
</header>

<section id="projects">
<h2>Creative Works</h2>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'rest')">Restaurants</button>
<button class="tab-btn" onclick="openTab(event,'cosmetics')">Cosmetics</button>
<button class="tab-btn" onclick="openTab(event,'design')">Design</button>
<button class="tab-btn" onclick="openTab(event,'barber')">Barber</button>
<button class="tab-btn" onclick="openTab(event,'ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel Design</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Advertisements</div>
</div>
</div>

</section>

<!-- Popup -->
<div id="popup" class="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc" style="color:#aaa;margin:10px 0;"></p>
<div id="links"></div>
</div>
</div>

<!-- WhatsApp -->
<a id="whatsapp" href="https://wa.me/201115002997" target="_blank">💬</a>

<footer>
© 2026 Khalil Ayman
</footer>

<script>
function openTab(evt,id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
evt.currentTarget.classList.add("active");
}

function openBrand(b){

const data={
hirisk:{title:"Hi Risk",desc:"Restaurant & cafe.",links:[["Instagram","https://www.instagram.com/hiriskcafe"]]},
hameed:{title:"Hameed",desc:"Restaurant.",links:[["Instagram","https://www.instagram.com/hameedegypt"]]},
ceramed:{title:"Ceramed",desc:"Cosmetics shop.",links:[["Instagram","https://www.instagram.com/ceramed.pharma"]]},
mokbel:{title:"Mokbel",desc:"Architecture.",links:[["Instagram","https://www.instagram.com/mokbeldesignco"]]},
flebiny:{title:"Flebiny",desc:"Barber.",links:[["Work","https://drive.google.com"]]},
ads:{title:"Ads",desc:"Campaigns.",links:[["Vlog","https://drive.google.com"]]}
};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank" class="btn">${l[0]}</a>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
