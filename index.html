<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#0f172a;
color:white;
line-height:1.6;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{font-size:48px;}
header p{color:#94a3b8;margin-top:10px;}

.btn{
margin-top:15px;
padding:10px 20px;
background:#38bdf8;
border-radius:5px;
color:white;
display:inline-block;
}

nav{
background:#020617;
position:sticky;
top:0;
}

nav ul{
display:flex;
justify-content:center;
list-style:none;
}

nav li{margin:0 15px;}

nav a{
color:white;
padding:15px;
display:block;
text-decoration:none;
}

section{
max-width:1100px;
margin:auto;
padding:80px 20px;
}

h2{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
cursor:pointer;
}

footer{
background:#020617;
text-align:center;
padding:20px;
}

/* LIGHTBOX */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Content Creator | Writer | Actor</p>
<a class="btn" href="#achievements">View My Work</a>
</header>

<nav>
<ul>
<li><a href="#about">About</a></li>
<li><a href="#achievements">Achievements</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section id="about">
<h2>About Me</h2>

<div class="grid">
<div class="card">Award-winning poet & writer</div>
<div class="card">Content creator for brands</div>
<div class="card">Actor & storyteller</div>
</div>

</section>

<section id="achievements">

<h2>Achievements & Awards</h2>

<div class="grid">

<img src="images/award1.jpg" onclick="openImage(this.src)">
<img src="images/award2.jpg" onclick="openImage(this.src)">
<img src="images/award3.jpg" onclick="openImage(this.src)">
<img src="images/award4.jpg" onclick="openImage(this.src)">
<img src="images/award5.jpg" onclick="openImage(this.src)">
<img src="images/award6.jpg" onclick="openImage(this.src)">
<img src="images/award7.jpg" onclick="openImage(this.src)">
<img src="images/award8.jpg" onclick="openImage(this.src)">
<img src="images/award9.jpg" onclick="openImage(this.src)">

</div>

</section>

<section id="contact">

<h2>Contact</h2>

<div class="card">
📍 Giza, Egypt<br>
📞 +201115002997<br>
✉ Khalil.aayousef@gmail.com
</div>

</section>

<footer>
© 2026 Khalil Ayman
</footer>

<div id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>

function openImage(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}

function closeImage(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
