<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Creative Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f172a;color:white;line-height:1.6;}
a{text-decoration:none;color:#38bdf8;}

header{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;}
header h1{font-size:48px;margin-bottom:10px;}
header p{font-size:20px;color:#cbd5f5;}

.btn{margin-top:15px;padding:12px 25px;background:#38bdf8;border:none;border-radius:6px;color:white;display:inline-block;cursor:pointer;}

nav{background:#020617;position:sticky;top:0;z-index:1000;}
nav ul{display:flex;justify-content:center;list-style:none;}
nav li{margin:0 20px;}
nav a{color:white;display:block;padding:15px;}
nav a:hover{color:#38bdf8;}

section{max-width:1100px;margin:auto;padding:80px 20px;}
h2{text-align:center;margin-bottom:40px;font-size:32px;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;}

.card{background:#1e293b;padding:20px;border-radius:10px;text-align:center;transition:.3s;cursor:pointer;}
.card:hover{transform:translateY(-5px);}

footer{background:#020617;text-align:center;padding:20px;}

/* Tabs */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Popup */
#popup{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}
.popup-box{
background:#1e293b;
padding:25px;
border-radius:10px;
width:90%;
max-width:500px;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman Abdelaziz</h1>
<p>Creative Content Creator | Freelancer</p>
<p>Haram St., Giza – Egypt</p>

<a class="btn" href="#projects">View My Work</a>
<a class="btn" href="Khalil_Ayman_CV.pdf" download>Download CV</a>
</header>

<nav>
<ul>
<li><a href="#projects">Works</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- Creative Works -->
<section id="projects">
<h2>Creative Works</h2>

<div style="text-align:center;margin-bottom:30px;">
<button class="btn" onclick="openTab('rest')">Restaurants</button>
<button class="btn" onclick="openTab('cosmetics')">Cosmetics</button>
<button class="btn" onclick="openTab('design')">Design</button>
<button class="btn" onclick="openTab('shoes')">Shoes</button>
<button class="btn" onclick="openTab('medical')">Medical</button>
<button class="btn" onclick="openTab('barber')">Barber</button>
<button class="btn" onclick="openTab('ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel Design</div>
</div>
</div>

<div id="shoes" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('calzolaio')">Calzolaio</div>
</div>
</div>

<div id="medical" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('almoudawah')">Almoudawah</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Advertisements</div>
</div>
</div>

</section>

<!-- Popup -->
<div id="popup" onclick="closePopup()">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<p id="desc"></p>
<div id="links"></div>
</div>
</div>

<script>
function openTab(id){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openBrand(b){

const data={
hirisk:{title:"Hi Risk",desc:"Restaurant & cafe in Tanta.",links:[
["Instagram","https://www.instagram.com/hiriskcafe"],
["TikTok","https://www.tiktok.com/@hi_risk1"]
]},
ceramed:{title:"Ceramed",desc:"Cosmetics shop.",links:[
["Instagram","https://www.instagram.com/ceramed.pharma"],
["TikTok","https://www.tiktok.com/@ceramed.pharma"]
]},
hameed:{title:"Hameed",desc:"Restaurant.",links:[
["Instagram","https://www.instagram.com/hameedegypt"],
["TikTok","https://www.tiktok.com/@hameedeg"]
]},
mokbel:{title:"Mokbel Design",desc:"Architecture content.",links:[
["Instagram","https://www.instagram.com/mokbeldesignco"],
["TikTok","https://www.tiktok.com/@mokbel.designco"]
]},
calzolaio:{title:"Calzolaio",desc:"Italian storytelling.",links:[
["Instagram","https://www.instagram.com/calzolaioegypt"],
["TikTok","https://www.tiktok.com/@calzolaioegypt"]
]},
almoudawah:{title:"Almoudawah",desc:"Medical services.",links:[
["Instagram","https://www.instagram.com/almoudawah"],
["TikTok","https://www.tiktok.com/@almoudawah11"]
]},
flebiny:{title:"Flebiny Salon",desc:"Celebrity barber.",links:[
["Work","https://drive.google.com/drive/folders/1cU50kiA03-uOSvTkqK-fW02kgTCDMX7G"],
["Instagram","https://www.instagram.com/flebiny_salon"]
]},
ads:{title:"Ads",desc:"Campaigns.",links:[
["Christmas","https://vt.tiktok.com/ZSHY1pSfk/"],
["Vlog","https://drive.google.com/file/d/1aeLtUCkgWUGnuYmayYFvfFtHO6Fvd8n-/view"]
]}
};

let item=data[b];

document.getElementById("title").innerText=item.title;
document.getElementById("desc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l[1]}" target="_blank" class="btn">${l[0]}</a><br>`;
});

document.getElementById("links").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
