<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ayman | Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f172a;color:white;}
a{text-decoration:none;color:#38bdf8;}

header{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
header h1{font-size:40px;}
.btn{margin:10px;padding:10px 20px;background:#38bdf8;border-radius:6px;color:white;}

nav{background:#020617;position:sticky;top:0;}
nav ul{display:flex;justify-content:center;list-style:none;}
nav li{margin:0 15px;}
nav a{color:white;padding:15px;display:block;}

section{max-width:1100px;margin:auto;padding:60px 20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}

.card{background:#1e293b;padding:20px;border-radius:10px;text-align:center;cursor:pointer;}

.tabs{text-align:center;margin-bottom:20px;}
.tab-btn{padding:10px;margin:5px;background:#1e293b;color:white;border:none;cursor:pointer;}
.tab-btn.active{background:#38bdf8;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;}
.popup-content{background:#1e293b;padding:20px;border-radius:10px;text-align:center;width:90%;max-width:400px;}
</style>
</head>

<body>

<header>
<h1>Khalil Ayman</h1>
<p>Creative Content Creator</p>
</header>

<section id="projects">
<h2 style="text-align:center;margin-bottom:20px;">Creative Works</h2>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'rest')">Restaurants</button>
<button class="tab-btn" onclick="openTab(event,'cosmetics')">Cosmetics</button>
<button class="tab-btn" onclick="openTab(event,'design')">Design</button>
<button class="tab-btn" onclick="openTab(event,'shoes')">Shoes</button>
<button class="tab-btn" onclick="openTab(event,'medical')">Medical</button>
<button class="tab-btn" onclick="openTab(event,'barber')">Barber</button>
<button class="tab-btn" onclick="openTab(event,'ads')">Ads</button>
</div>

<div id="rest" class="tab-content active">
<div class="grid">
<div class="card" onclick="openBrand('hirisk')">Hi Risk</div>
<div class="card" onclick="openBrand('hameed')">Hameed</div>
</div>
</div>

<div id="cosmetics" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ceramed')">Ceramed</div>
</div>
</div>

<div id="design" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('mokbel')">Mokbel Design</div>
</div>
</div>

<div id="shoes" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('calzolaio')">Calzolaio</div>
</div>
</div>

<div id="medical" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('almoudawah')">Almoudawah</div>
</div>
</div>

<div id="barber" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('flebiny')">Flebiny Salon</div>
</div>
</div>

<div id="ads" class="tab-content">
<div class="grid">
<div class="card" onclick="openBrand('ads')">Advertisements</div>
</div>
</div>

</section>

<!-- Popup -->
<div id="brandPopup" class="popup" onclick="closePopup()">
<div class="popup-content" onclick="event.stopPropagation()">
<h2 id="brandTitle"></h2>
<p id="brandDesc"></p>
<div id="brandLinks"></div>
</div>
</div>

<script>
function openTab(evt, tab){
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(tab).classList.add("active");
evt.currentTarget.classList.add("active");
}

function openBrand(brand){

const data={

hirisk:{title:"Hi Risk",desc:"Content creation for restaurant branding.",links:[]},
hameed:{title:"Hameed",desc:"Food content creation.",links:[]},
ceramed:{title:"Ceramed",desc:"Cosmetics content creation.",links:[]},
mokbel:{title:"Mokbel Design",desc:"Architecture content.",links:[]},
calzolaio:{title:"Calzolaio",desc:"Brand storytelling.",links:[]},
almoudawah:{title:"Almoudawah",desc:"Medical content.",links:[]},

flebiny:{
title:"Flebiny Salon",
desc:"Premium barber content.",
links:[
{title:"Work",url:"https://drive.google.com/drive/folders/1cU50kiA03-uOSvTkqK-fW02kgTCDMX7G"},
{title:"Facebook",url:"https://www.facebook.com/share/1EzSyaTWBh/"},
{title:"Instagram",url:"https://www.instagram.com/flebiny_salon"},
{title:"TikTok",url:"https://www.tiktok.com/@flebinysalon"}
]
},

ads:{
title:"Advertisements",
desc:"Creative campaigns.",
links:[
{title:"Christmas",url:"https://vt.tiktok.com/ZSHY1pSfk/"},
{title:"Novels",url:"https://drive.google.com/file/d/1X-ASf6_zbiyZjJ6jNUF1tGXlCmvJr87l/view"},
{title:"Halan",url:"https://drive.google.com/file/d/16WOXSdBURBaNYtBwVX0eapmpQwrLS7IQ/view"},
{title:"Vlog",url:"https://drive.google.com/file/d/1aeLtUCkgWUGnuYmayYFvfFtHO6Fvd8n-/view"}
]
}

};

let item=data[brand];
document.getElementById("brandTitle").innerText=item.title;
document.getElementById("brandDesc").innerText=item.desc;

let html="";
item.links.forEach(l=>{
html+=`<a href="${l.url}" target="_blank" class="btn">${l.title}</a><br>`;
});

document.getElementById("brandLinks").innerHTML=html;
document.getElementById("brandPopup").style.display="flex";
}

function closePopup(){
document.getElementById("brandPopup").style.display="none";
}
</script>

</body>
</html>
